<!DOCTYPE html>
<html>
<head>
    <title>Real-Time Board</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
        }
        #canvas-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #board {
            border: 2px solid #333;
            background-color: white;
            cursor: crosshair;
        }
        .toolbar {
            margin-bottom: 10px;
            display: flex;
            gap: 15px;
            align-items: center;
            background: white;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div id="canvas-container">
        <div class="toolbar">
            <label for="shapeSelect">Shape: </label>
            <select id="shapeSelect">
                <option value="freehand">Freehand (Pen)</option>
                <option value="line">Line</option>
                <option value="rectangle">Rectangle</option>
                <option value="circle">Circle</option>
            </select>
            <label for="colorPicker">Color: </label>
            <input type="color" id="colorPicker" value="#000000">
            <label for="lineWidth">Line Width: </label>
            <input type="range" id="lineWidth" min="1" max="20" value="5">
            <button id="undoBtn">Undo</button>
            <button id="clearBtn">Clear Board</button>
        </div>
        <canvas id="board" width="800" height="600"></canvas>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('board');
            const ctx = canvas.getContext('2d');
            const socket = io();

            let isDrawing = false;
            let startX = 0;
            let startY = 0;
            let currentShape = 'freehand';
            let currentColor = '#000000';
            let currentLineWidth = 5;
            let localDrawingData = []; // Store all drawings locally

            // Shape selector
            document.getElementById('shapeSelect').addEventListener('change', (e) => {
                currentShape = e.target.value;
            });

            // Color picker
            document.getElementById('colorPicker').addEventListener('change', (e) => {
                currentColor = e.target.value;
            });

            // Line width slider
            document.getElementById('lineWidth').addEventListener('change', (e) => {
                currentLineWidth = e.target.value;
            });

            // Undo button
            document.getElementById('undoBtn').addEventListener('click', () => {
                if (localDrawingData.length > 0) {
                    localDrawingData.pop();
                    redrawAll();
                    socket.emit('undo', {});
                }
            });

            // Clear button
            document.getElementById('clearBtn').addEventListener('click', () => {
                localDrawingData = [];
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                socket.emit('clear', {});
            });

            // Handle initial connection and existing drawing data
            socket.on('connect', () => {
                console.log('Connected to server.');
            });

            socket.on('drawing_data', (data) => {
                localDrawingData = data;
                data.forEach(d => drawShape(d));
            });

            // Handle incoming drawing updates from other clients
            socket.on('drawing_update', (data) => {
                localDrawingData.push(data);
                drawShape(data);
            });

            // Handle undo from other clients
            socket.on('undo_board', (data) => {
                localDrawingData = data;
                redrawAll();
            });

            // Handle clear board from other clients
            socket.on('clear_board', () => {
                localDrawingData = [];
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            });

            function redrawAll() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                localDrawingData.forEach(d => drawShape(d));
            }

            function drawShape(data) {
                const { shape, x, y, start_x, start_y, color, lineWidth, prev_x, prev_y } = data;
                ctx.strokeStyle = color || '#000';
                ctx.lineWidth = lineWidth || 5;
                ctx.beginPath();

                if (shape === 'freehand' || shape === undefined) {
                    ctx.moveTo(prev_x, prev_y);
                    ctx.lineTo(x, y);
                } else if (shape === 'line') {
                    ctx.moveTo(start_x, start_y);
                    ctx.lineTo(x, y);
                } else if (shape === 'rectangle') {
                    ctx.rect(start_x, start_y, x - start_x, y - start_y);
                } else if (shape === 'circle') {
                    const radius = Math.sqrt(Math.pow(x - start_x, 2) + Math.pow(y - start_y, 2));
                    ctx.arc(start_x, start_y, radius, 0, 2 * Math.PI);
                }

                ctx.stroke();
                ctx.closePath();
            }

            function drawPreview(shape, startX, startY, endX, endY) {
                ctx.strokeStyle = currentColor;
                ctx.lineWidth = currentLineWidth;
                ctx.setLineDash([5, 5]);
                ctx.beginPath();

                if (shape === 'line') {
                    ctx.moveTo(startX, startY);
                    ctx.lineTo(endX, endY);
                } else if (shape === 'rectangle') {
                    ctx.rect(startX, startY, endX - startX, endY - startY);
                } else if (shape === 'circle') {
                    const radius = Math.sqrt(Math.pow(endX - startX, 2) + Math.pow(endY - startY, 2));
                    ctx.arc(startX, startY, radius, 0, 2 * Math.PI);
                }

                ctx.stroke();
                ctx.closePath();
                ctx.setLineDash([]); // Reset dash
            }

            canvas.addEventListener('mousedown', (e) => {
                isDrawing = true;
                [startX, startY] = [e.offsetX, e.offsetY];
            });

            canvas.addEventListener('mousemove', (e) => {
                if (!isDrawing) return;

                if (currentShape === 'freehand') {
                    const data = {
                        x: e.offsetX,
                        y: e.offsetY,
                        prev_x: startX,
                        prev_y: startY,
                        color: currentColor,
                        lineWidth: currentLineWidth,
                        shape: currentShape
                    };
                    drawShape(data);
                    localDrawingData.push(data);
                    socket.emit('draw', data);
                    [startX, startY] = [e.offsetX, e.offsetY];
                } else {
                    // For shapes, redraw all existing + show preview
                    redrawAll();
                    drawPreview(currentShape, startX, startY, e.offsetX, e.offsetY);
                }
            });

            canvas.addEventListener('mouseup', (e) => {
                if (!isDrawing) return;
                isDrawing = false;

                if (currentShape !== 'freehand') {
                    const data = {
                        x: e.offsetX,
                        y: e.offsetY,
                        start_x: startX,
                        start_y: startY,
                        color: currentColor,
                        lineWidth: currentLineWidth,
                        shape: currentShape
                    };
                    localDrawingData.push(data);
                    redrawAll();
                    drawShape(data);
                    socket.emit('draw', data);
                }
            });

            canvas.addEventListener('mouseout', () => isDrawing = false);
        });
    </script>
</body>
</html>
